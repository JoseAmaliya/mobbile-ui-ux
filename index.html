<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matcha & Pastry Cafe</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div id="loginPage">

<h1>🍵 Matcha & Pastry Cafe</h1>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Masuk</button>

<p>
admin / admin123
</p>

</div>

<div id="app" style="display:none;">

<h2>🍵 Matcha & Pastry Cafe</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('produk')">Produk</button>
<button onclick="showPage('profil')">Profil</button>
<button onclick="showPage('setting')">Setting</button>

<section id="dashboard" class="page">

<h1>Dashboard</h1>

<p>Total Menu : 22</p>
<p>Matcha Series : 10</p>
<p>Pastry Series : 12</p>

</section>

<section id="produk" class="page" style="display:none;">

<h1>Produk</h1>

<input
type="text"
id="searchMenu"
placeholder="Cari menu..."
onkeyup="searchMenu()">

<div class="produk-card">
<h3>Matcha Latte</h3>
</div>

<div class="produk-card">
<h3>Iced Matcha Latte</h3>
</div>

<div class="produk-card">
<h3>Butter Croissant</h3>
</div>

<div class="produk-card">
<h3>Apple Danish</h3>
</div>

</section>

<section id="profil" class="page" style="display:none;">

<h1 id="userName">Admin</h1>

<p id="userRole">
Administrator
</p>

</section>

<section id="setting" class="page" style="display:none;">

<h2>Pengaturan</h2>

<button onclick="setTheme('dark')">
Dark Mode
</button>

<button onclick="setTheme('light')">
Light Mode
</button>

<button onclick="logout()">
Logout
</button>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
